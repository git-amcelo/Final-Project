{% extends 'base.html' %}
{% block title %}Reset Link Sent — GymBuddy{% endblock %}

{% block content %}
<div class="container">
    <div class="card gb-card gb-auth-card text-center">
        <div class="card-body p-4">
            <i class="bi bi-envelope-check display-4 text-success"></i>
            <h1 class="h4 fw-bold mt-3">Check your email</h1>
            <p class="text-muted">
                If an account exists with the address you entered, we've emailed a
                password reset link. It should arrive shortly.
            </p>
            <a class="btn btn-outline-secondary" href="{% url 'login' %}">Back to login</a>
        </div>
    </div>
</div>
{% endblock %}
