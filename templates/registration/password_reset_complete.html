{% extends 'base.html' %}
{% block title %}Password Reset Complete — GymBuddy{% endblock %}

{% block content %}
<div class="container">
    <div class="card gb-card gb-auth-card text-center">
        <div class="card-body p-4">
            <i class="bi bi-check-circle display-4 text-success"></i>
            <h1 class="h4 fw-bold mt-3">Password updated!</h1>
            <p class="text-muted">Your password has been reset. You can now log in with the new one.</p>
            <a class="btn btn-warning fw-semibold" href="{% url 'login' %}">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
