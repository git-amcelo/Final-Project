{# Cream page-header band: bold title + subtitle, optional right-aligned action button. #}
<div class="gb-page-header">
    <div class="container d-flex flex-wrap justify-content-between align-items-center gap-3">
        <div>
            <h1 class="h2 mb-1">{{ title }}</h1>
            {% if subtitle %}<p>{{ subtitle }}</p>{% endif %}
        </div>
        {% if action_url %}
            <a href="{{ action_url }}" class="btn btn-warning">{{ action_label }}</a>
        {% endif %}
    </div>
</div>
